    async function sendTeacherText(text) {
      const trimmed = (text || '').trim();
      let turnStarted = false;
      try {
        if (!trimmed || state.busy) return;
        if (!state.apiKey) {
          setError(new Error('Missing API key'));
          return;
        }

        turnStarted = true;
        if (!state.voiceMode) uiState.restoreTeacherInputFocus = true;
        pauseVoiceCapture();
        scrollState.chatPinnedBottom = true;

        state.chat.push({ role: 'teacher', text: trimmed });
        const ta = root.querySelector('#teacher-input');
        if (ta) ta.value = '';
        setBusy(true, 'Student thinking…');

        const prior = state.chat.slice(0, -1);
        const userText = buildTeachingUserPayload(trimmed, prior);
        const raw = await callGemini({
          systemInstruction: state.prompts.teaching,
          userText,
          responseJson: true,
        });
        const parsed = parseJsonLoose(raw);
        const notes = parsed.internalNotes || {};
        const facts = Array.isArray(notes.facts) ? notes.facts.filter((f) => typeof f === 'string') : [];
        const links = Array.isArray(notes.links) ? notes.links.filter((l) => typeof l === 'string') : [];
        if (facts.length || links.length) {
          state.taughtNotes.push({
            concept: String(notes.concept || '').trim(),
            facts,
            links,
          });
        }
        const studentMsg = {
          role: 'student',
          thinking: String(parsed.thinking || '').trim(),
          shortReply: String(parsed.shortReply || '…').trim(),
          notesLogSource: parseNotesLogSource(parsed),
        };
        state.chat.push(studentMsg);

        if (state.voiceMode && state.voiceTtsEnabled) {
          state.busy = false;
          state.busyLabel = '';
          state.voiceStatus = 'speaking';
          render();
          await speakStudentReply(studentMsg);
        }
      } catch (e) {
        if (state.chat.length && state.chat[state.chat.length - 1]?.role === 'teacher') {
          state.chat.pop();
        }
        setError(e);
      } finally {
        state.busy = false;
        state.busyLabel = '';
        if (!turnStarted) {
          voiceSession.pendingSend = false;
          voiceSession.suppressOnendTranscript = false;
          voiceSession.inputPaused = false;
          if (!state.voiceMode) render();
          return;
        }
        if (state.voiceMode) {
          resumeVoiceInput();
        } else {
          voiceSession.pendingSend = false;
          render();
        }
      }
    }

    async function onTeacherSend() {
      const ta = root.querySelector('#teacher-input');
      const text = ta?.value?.trim();
      if (!text || state.busy) return;
      if (state.voiceMode) {
        clearLiveTranscript();
        voiceSession.suppressOnendTranscript = true;
        pauseVoiceCapture();
      }
      await sendTeacherText(text);
    }

    async function onQuestionSetupSubmit() {
      const promptEl = root.querySelector('#question-prompt-input');
      const answerEl = root.querySelector('#question-answer-input');
      const profileEl = root.querySelector('#question-knowledge-profile');
      const prompt = promptEl?.value?.trim();
      if (!prompt || state.busy) return;
      if (!state.apiKey) {
        setError(new Error('Missing API key'));
        return;
      }

      const nextProfile = profileEl?.value;
      if (nextProfile && nextProfile !== state.knowledgeProfile) {
        const hasSessionProgress =
          state.taughtNotes.length > 0 || state.chat.some((m) => m.role === 'student');
        setKnowledgeProfile(nextProfile, { clearTaught: !hasSessionProgress });
      }

      const referenceAnswer = answerEl?.value?.trim() || '';
      setBusy(true, referenceAnswer ? 'Building rubric from answer…' : 'Finding model answer…');
      try {
        let parsed;
        if (referenceAnswer) {
          const raw = await callGemini({
            systemInstruction: state.prompts.answerFromTeacher,
            userText: `QUESTION:\n${prompt}\n\nTEACHER'S REFERENCE ANSWER:\n${referenceAnswer}`,
            responseJson: true,
          });
          parsed = parseJsonLoose(raw);
        } else {
          const raw = await callGemini({
            systemInstruction: state.prompts.answerInference,
            userText: `QUESTION:\n${prompt}`,
            responseJson: true,
          });
          parsed = parseJsonLoose(raw);
        }

        const question = buildQuestionFromParsed(parsed, prompt, referenceAnswer);
        if (question.questionType === 'open_response' && !question.goldenBullets.length) {
          throw new Error('Could not build a grading rubric for this question. Try pasting a reference answer.');
        }

        state.question = question;
        state.showQuestionModal = false;
        state.examAnswers = {};
        state.examDeployComplete = false;
        state.grades = [];
        state.teachingFeedback = null;
        removeExamBlocksFromChat();
        state.statusLine = 'Question ready. Teach the student, then Deploy exam.';
      } catch (e) {
        setError(e);
      } finally {
        setBusy(false);
      }
    }

    async function onDeployExam() {
      if (!state.question || state.busy) return;
      const items = orderExamItemsForDeploy(buildExamItemsList());
      state.examAnswers = {};
      state.examDeployComplete = false;
      state.grades = [];
      state.teachingFeedback = null;
      state.chatPanelTab = 'chat';
      scrollState.chatPinnedBottom = true;
      const block = startExamChatBlock();

      setBusy(true, 'Running exam…');
      try {
        for (let i = 0; i < items.length; i++) {
          const item = items[i];
          state.busyLabel = `Running exam (${i + 1}/${items.length})…`;

          block.items.push({
            questionId: item.id,
            label: item.label,
            displayNumber: item.displayNumber,
            parentId: item.parentId,
            partLabel: item.partLabel,
            parentContext: item.parentContext,
            prompt: item.prompt,
            questionType: item.questionType,
            answerDepth: item.answerDepth,
            choices: item.choices,
            answer: null,
            grade: null,
          });
          render();

          const raw = await callGemini({
            systemInstruction: state.prompts.studentExam,
            userText: buildExamUserMessage(item),
            responseJson: true,
            temperature: 0.15,
          });
          let parsed = {};
          try {
            parsed = parseJsonLoose(raw);
          } catch {
            parsed = { examAnswer: String(raw).trim(), memoryNotesUsed: [] };
          }
          const answerObj = buildExamAnswerFromParsed(item, parsed);
          state.examAnswers[item.id] = answerObj;
          block.items[block.items.length - 1].answer = answerObj;
          render();
        }
        block.inProgress = false;
        state.examDeployComplete = items.length > 0 && items.every((it) => state.examAnswers[it.id] != null);
        state.statusLine = state.examDeployComplete
          ? 'Exam complete. Review answers in Chat, then Grade.'
          : 'Exam finished with missing answers. Deploy again before grading.';
        render();
      } catch (e) {
        const blockOnError = getExamChatBlock();
        if (blockOnError) blockOnError.inProgress = false;
        state.examDeployComplete = false;
        setError(e);
      } finally {
        setBusy(false);
      }
    }

    async function onGradeAll() {
      const items = buildExamItemsList();
      if (!items.length || state.busy || !state.examDeployComplete) return;

      setBusy(true, 'Grading…');
      state.grades = [];
      state.teachingFeedback = null;
      state.chatPanelTab = 'chat';
      scrollState.chatPinnedBottom = true;
      try {
        for (const item of items) {
          const answer = state.examAnswers[item.id];
          const studentAnswer = getExamAnswerText(answer);

          if (item.questionType === 'multiple_choice') {
            const selected =
              typeof answer === 'object' ? String(answer?.selectedChoiceId || '').trim().toUpperCase() : '';
            const correct = String(item.correctChoiceId || '').trim().toUpperCase();
            const isCorrect = selected && correct && selected === correct;
            state.grades.push({
              questionId: item.id,
              questionType: 'multiple_choice',
              hitBullets: isCorrect ? [0] : [],
              missedBullets: isCorrect ? [] : [0],
              pointsEarned: isCorrect ? 1 : 0,
              pointsPossible: 1,
              feedback: isCorrect
                ? `Correct — selected ${selected}.`
                : `Incorrect — selected ${selected || 'UNKNOWN'}; correct answer is ${correct || '?'}.`,
              studentAnswer,
              selectedChoiceId: selected,
              correctChoiceId: correct,
            });
            applyGradesToExamChat([state.grades[state.grades.length - 1]]);
            render();
            continue;
          }

          const rubric = (item.goldenBullets || []).filter(Boolean);
          if (!rubric.length) {
            state.grades.push({
              questionId: item.id,
              questionType: 'open_response',
              hitBullets: [],
              missedBullets: [],
              pointsEarned: 0,
              pointsPossible: 0,
              ungraded: true,
              feedback:
                'No grading rubric (goldenBullets) for this question. Edit the question and provide a reference answer, or re-run setup with answer inference.',
              studentAnswer,
              goldenBullets: [],
            });
            applyGradesToExamChat([state.grades[state.grades.length - 1]]);
            state.busyLabel = `Grading (${state.grades.length}/${items.length})…`;
            render();
            continue;
          }

          const raw = await callGemini({
            systemInstruction: state.prompts.grader,
            userText: buildGraderUserContent({ ...item, goldenBullets: rubric }, studentAnswer),
            responseJson: true,
          });
          const g = parseJsonLoose(raw);
          const possible = rubric.length;
          const hits = normalizeHitBullets(g.hitBullets, possible);
          const missed = [];
          for (let i = 0; i < possible; i++) {
            if (!hits.includes(i)) missed.push(i);
          }
          const earned = hits.length;
          state.grades.push({
            questionId: g.questionId || item.id,
            questionType: 'open_response',
            hitBullets: hits,
            missedBullets: missed,
            pointsEarned: earned,
            pointsPossible: possible,
            feedback: g.feedback || '',
            studentAnswer,
            goldenBullets: rubric,
          });
          applyGradesToExamChat([state.grades[state.grades.length - 1]]);
          state.busyLabel = `Grading (${state.grades.length}/${items.length})…`;
          render();
        }
        state.statusLine = 'Grading complete.';
        render();
      } catch (e) {
        setError(e);
      } finally {
        setBusy(false);
      }
    }

    async function onAskTeachingFeedback() {
      if (!state.grades.length || state.busy) return;
      if (!state.apiKey) {
        setError(new Error('Missing API key'));
        return;
      }

      setBusy(true, 'Generating teaching feedback…');
      try {
        const raw = await callGemini({
          systemInstruction: state.prompts.teachingFeedback,
          userText: buildTeachingFeedbackUserContent(),
          responseJson: true,
        });
        const parsed = parseJsonLoose(raw);
        const tips = Array.isArray(parsed.tips)
          ? parsed.tips.map((t) => String(t).trim()).filter(Boolean).slice(0, 3)
          : [];
        if (tips.length < 3) {
          throw new Error('Expected 3 feedback tips from the model.');
        }
        state.teachingFeedback = { tips };
        state.statusLine = 'Teaching feedback ready.';
        render();
      } catch (e) {
        setError(e);
      } finally {
        setBusy(false);
      }
    }

    // =============================================================================
    // ---- bootstrap ----
    // =============================================================================
    loadSettings();
    render();
  </script>
</body>
</html>
